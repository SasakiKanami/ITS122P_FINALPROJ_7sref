<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Admin Login | Wanderlust</title>

    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/login_style.css" />
  </head>

<body>
    <div class="container">
        <div class="carousel-panel">
            <div class="carousel-container">
                <img src="" alt="Featured Product" class="carousel-image" id="carouselCurrent">
                <div class="carousel-dots" id="carouselDots"></div>
            </div>
        </div>

      <div class="form-box login">
        <form id="admin-login-form">
          <h2>Admin Login</h2>

          <div class="input-box">
            <input type="email" id="admin-email" placeholder="Email" required />
            <i class="bx bxs-user"></i>
          </div>

          <div class="input-box">
            <input type="password" id="admin-password" placeholder="Password" required />
            <i class="bx bxs-lock-alt" id="togglePassword" style="cursor:pointer;" onclick="
              const p = document.getElementById('admin-password');
              p.type = p.type === 'password' ? 'text' : 'password';
              this.classList.toggle('bxs-lock-alt');
              this.classList.toggle('bxs-lock-open-alt');
            "></i>
          </div>

          <div class="forgot-link">
            <a href="admin_forgot_pass.html">Forgot password?</a>
          </div>

          <button type="submit" class="btn">Login to Admin Panel</button>

          <div class="register-link" style="margin-top: 18px;">
            <a href="login.html">Back to User Login</a>
          </div>

          <div id="admin-login-error" style="color:#dc3545; margin-top:12px; text-align:center; font-size:14px;">
          </div>
        </form>
      </div>
    </div>

    <footer>
        <p>&copy; 2026 WanderLustBagsPH. All rights reserved.</p>
    </footer>

    <script type="module" src="../js/admin_authentication.js"></script>
</body>
</html>
